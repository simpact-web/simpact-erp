function log(msg, cls='inf') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runDiag() {
  document.getElementById('log').innerHTML = '';
  log('── Diagnostic connexion Supabase ────────────────');
  log('URL : ' + SUPA_URL);

  // Test 1 : fetch brut
  try {
    const r = await fetch(SUPA_URL + '/rest/v1/', {
      headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY }
    });
    log('✓ Connexion HTTP OK — statut ' + r.status, r.ok ? 'ok' : 'warn');
  } catch(e) {
    log('✗ Connexion impossible : ' + e.message, 'err');
    log('→ Cause probable : réseau/FAI bloque Supabase, ou URL incorrecte', 'warn');
    log('→ Essayez de désactiver tout VPN / extension de navigateur', 'warn');
    return;
  }

  // Test 2 : lecture table clients
  const supa = supabase.createClient(SUPA_URL, SUPA_KEY);
  const { data, error } = await supa.from('clients').select('id').limit(1);
  if (error) {
    log('✗ Erreur lecture table clients : ' + error.message, 'err');
  } else {
    log('✓ Table clients accessible — ' + (data?.length || 0) + ' ligne(s) lues', 'ok');
    log('Connexion Supabase opérationnelle. Vous pouvez lancer l\'import.', 'ok');
  }
}

async function runSeed() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';
  const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

  log('── Insertion des clients ─────────────────────────');
  const { error: ce } = await supa.from('clients').upsert(CLIENTS, { onConflict: 'id', ignoreDuplicates: true });
  if (ce) {
    log('ERREUR clients : ' + ce.message, 'err');
  } else {
    log('✓ ' + CLIENTS.length + ' clients insérés', 'ok');
  }

  log('── Insertion des comptes portail ─────────────────');
  const { error: ue } = await supa.from('utilisateurs').upsert(USERS, { onConflict: 'id', ignoreDuplicates: true });
  if (ue) {
    log('ERREUR utilisateurs : ' + ue.message, 'err');
  } else {
    log('✓ ' + USERS.length + ' comptes utilisateurs insérés', 'ok');
  }

  log('── Vérification ─────────────────────────────────');
  const { data: checkC } = await supa.from('clients').select('id,name').in('id', CLIENTS.map(c=>c.id));
  log('Clients présents en base : ' + (checkC?.length||0) + '/' + CLIENTS.length, checkC?.length===CLIENTS.length?'ok':'err');

  const { data: checkU } = await supa.from('utilisateurs').select('id,username').in('id', USERS.map(u=>u.id));
  log('Utilisateurs présents en base : ' + (checkU?.length||0) + '/' + USERS.length, checkU?.length===USERS.length?'ok':'err');

  log('── Terminé ──────────────────────────────────────');
  document.getElementById('btn').textContent = '✓ Import terminé';
}
