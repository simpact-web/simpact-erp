<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMPACT ERP — Commandes</title>
  <link rel="stylesheet" href="css/simpact.css">
  <style>
    .status-pipeline {
      display: flex; gap: 0;
      background: var(--navy-dark);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .pipeline-step {
      flex: 1; padding: 14px 10px; text-align: center;
      cursor: pointer; transition: var(--transition);
      border-right: 1px solid var(--navy-border);
      position: relative;
    }
    .pipeline-step:last-child { border-right: none; }
    .pipeline-step:hover { background: var(--navy-hover); }
    .pipeline-step.active { background: var(--navy-light); }
    .pipeline-step .ps-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 600; display: block; line-height: 1;
    }
    .pipeline-step .ps-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin-top: 4px; display: block;
      font-family: 'DM Mono', monospace;
    }
    .pipeline-step.received .ps-count { color: var(--info); }
    .pipeline-step.bat     .ps-count { color: var(--warning); }
    .pipeline-step.production .ps-count { color: var(--gold); }
    .pipeline-step.done    .ps-count { color: var(--success); }

    .filters-bar {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-input {
      flex: 1; min-width: 200px;
      padding: 9px 14px 9px 36px;
      background: var(--navy-dark);
      border: 1px solid var(--navy-border);
      border-radius: var(--radius-md);
      color: var(--text-primary); font-size: 13px; outline: none;
      transition: var(--transition);
    }
    .search-input:focus { border-color: var(--gold); }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; font-size: 14px; }

    /* Timeline commande */
    .order-timeline {
      display: flex; gap: 0; margin: 16px 0;
    }
    .ot-step {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .ot-step:not(:last-child)::after {
      content: ''; position: absolute;
      top: 14px; left: 50%; width: 100%; height: 2px;
      background: var(--navy-border); z-index: 0;
    }
    .ot-step.done::after { background: var(--gold); }
    .ot-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; z-index: 1; border: 2px solid var(--navy-border);
      background: var(--navy-dark);
    }
    .ot-step.done .ot-dot    { background: var(--gold); border-color: var(--gold); color: var(--navy-dark); }
    .ot-step.active .ot-dot  { border-color: var(--gold); color: var(--gold); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)} 50%{box-shadow:0 0 0 6px rgba(201,168,76,0)} }
    .ot-label { font-size: 9px; color: var(--text-muted); margin-top: 5px; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'DM Mono', monospace; }
    .ot-step.done  .ot-label { color: var(--gold); }
    .ot-step.active .ot-label { color: var(--text-primary); }
  </style>
</head>
<body>
<div class="erp-layout">
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-logo">S</div>
      <div class="brand-text">
        <div class="brand-name">SIMPACT</div>
        <div class="brand-sub">ERP v4.0</div>
      </div>
    </div>
    <div class="topbar-center"><span style="font-size:13px;color:var(--text-muted)">Gestion des Commandes</span></div>
    <div class="topbar-right">
      <div class="user-chip" id="user-chip"></div>
    </div>
  </header>

  <nav class="sidebar">
    <div class="nav-section-label">Navigation</div>
    <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon">◈</span><span>Tableau de bord</span></a>
    <a href="orders.html" class="nav-item" data-page="orders"><span class="nav-icon">📋</span><span>Commandes</span></a>
    <a href="configurator.html" class="nav-item" data-page="configurator"><span class="nav-icon">⚙</span><span>Configurateur prix</span></a>
    <a href="stock.html" class="nav-item" data-page="stock"><span class="nav-icon">📦</span><span>Stocks papier</span></a>
    <div class="nav-separator"></div>
    <div class="nav-section-label">Gestion</div>
    <a href="clients.html" class="nav-item" data-page="clients"><span class="nav-icon">🏛</span><span>Clients</span></a>
    <a href="reporting.html" class="nav-item" data-page="reporting"><span class="nav-icon">📊</span><span>Reporting</span></a>
    <div class="nav-separator"></div>
    <a href="#" class="nav-item" onclick="SIMPACT_AUTH.logout()"><span class="nav-icon">⎋</span><span>Déconnexion</span></a>
  </nav>

  <main class="main-content page-enter">
    <div class="page-header">
      <div>
        <div class="page-title">Commandes</div>
        <div class="page-subtitle">Suivi et gestion de toutes les commandes clients</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openNewOrderModal()">+ Nouvelle commande</button>
      </div>
    </div>

    <!-- Pipeline statuts -->
    <div class="status-pipeline" id="pipeline"></div>

    <!-- Filtres -->
    <div class="filters-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher une commande, un client…" oninput="filterOrders()">
      </div>
      <select class="form-control" style="width:180px" id="statusFilter" onchange="filterOrders()">
        <option value="">Tous les statuts</option>
        <option value="received">Reçue</option>
        <option value="bat">BAT</option>
        <option value="production">Production</option>
        <option value="done">Livré</option>
        <option value="cancelled">Annulé</option>
      </select>
      <select class="form-control" style="width:200px" id="clientFilter" onchange="filterOrders()">
        <option value="">Tous les clients</option>
      </select>
    </div>

    <!-- Tableau -->
    <div class="card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Réf.</th><th>Client</th><th>Produit</th><th>Qtité</th>
              <th>Montant HT</th><th>Date</th><th>Statut</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal Détail commande -->
<div id="detailModal" style="display:none" class="modal-overlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:680px;width:95%">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle">Commande</div>
      <button onclick="document.getElementById('detailModal').style.display='none'" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- Modal Nouvelle commande -->
<div id="newOrderModal" style="display:none" class="modal-overlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:600px;width:95%">
    <div class="modal-header">
      <div class="modal-title">Nouvelle commande</div>
      <button onclick="document.getElementById('newOrderModal').style.display='none'" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer">×</button>
    </div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Client</label>
          <select class="form-control" id="nc-client"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Produit</label>
          <select class="form-control" id="nc-product">
            <option>Cartes de visite</option><option>Flyers A5</option><option>Flyers A4</option>
            <option>Brochures A4</option><option>Affiches A2/A3</option><option>Enveloppes DL</option>
            <option>Papier en-tête</option><option>Dépliants</option><option>Livres N&B</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Quantité</label>
          <input type="number" class="form-control" id="nc-qty" placeholder="ex: 1000">
        </div>
        <div class="form-group">
          <label class="form-label">Montant HT (DT)</label>
          <input type="number" class="form-control" id="nc-price" placeholder="ex: 85.00" step="0.01">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Spécifications</label>
        <div class="grid-2">
          <input type="text" class="form-control" id="nc-format" placeholder="Format (ex: 85×54mm)">
          <input type="text" class="form-control" id="nc-paper" placeholder="Papier (ex: 350g Mat)">
        </div>
      </div>
      <div class="grid-2" style="margin-top:8px">
        <div class="form-group">
          <label class="form-label">Mode impression</label>
          <select class="form-control" id="nc-color">
            <option value="4/4">Quadri recto-verso (4/4)</option>
            <option value="4/0">Quadri recto (4/0)</option>
            <option value="N&B">Noir & Blanc</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Finitions</label>
          <input type="text" class="form-control" id="nc-finitions" placeholder="ex: Pelliculage Mat">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note interne</label>
        <textarea class="form-control" id="nc-note" rows="2" placeholder="Instructions particulières…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('newOrderModal').style.display='none'">Annuler</button>
      <button class="btn btn-primary" onclick="createOrder()">Créer la commande</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>
/* ── SIMPACT ERP — orders.html — toutes les fonctions au scope global ── */

const STATUS_CONFIG = {
  received:   { label:"Reçue",      badge:"badge-received",   icon:"📥", next:"bat",        nextLabel:"Envoyer BAT" },
  bat:        { label:"BAT",        badge:"badge-bat",        icon:"🖨",  next:"production", nextLabel:"Valider BAT → Production" },
  production: { label:"Production", badge:"badge-production", icon:"⚙",  next:"done",       nextLabel:"Marquer Livré" },
  done:       { label:"Livré",      badge:"badge-done",       icon:"✅", next:null,          nextLabel:null },
  cancelled:  { label:"Annulé",     badge:"badge-cancelled",  icon:"✕",  next:null,          nextLabel:null },
};

function renderPipeline(){
  const orders = DB.getOrders();
  const counts = {};
  ["received","bat","production","done"].forEach(s => counts[s] = orders.filter(o=>o.status===s).length);
  document.getElementById("pipeline").innerHTML = Object.entries(counts).map(([s,c])=>`
    <div class="pipeline-step ${s}" onclick="document.getElementById('statusFilter').value='${s}';filterOrders()">
      <span class="ps-count">${c}</span>
      <span class="ps-label">${STATUS_CONFIG[s].label}</span>
    </div>
  `).join("");
}

function renderClientFilter(){
  const sel = document.getElementById("clientFilter");
  DB.getClients().forEach(c => {
    const o = document.createElement("option"); o.value=c.id; o.textContent=c.name; sel.appendChild(o);
  });
}

function filterOrders(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  const st = document.getElementById("statusFilter").value;
  const cl = document.getElementById("clientFilter").value;
  let orders = DB.getOrders();
  if(st) orders = orders.filter(o=>o.status===st);
  if(cl) orders = orders.filter(o=>o.clientId===cl);
  if(q)  orders = orders.filter(o=>(o.id+o.clientName+o.product).toLowerCase().includes(q));
  renderTable(orders);
}

function renderTable(orders){
  const fmtDate = iso => new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  document.getElementById("ordersBody").innerHTML = orders.length ? orders.map(o => {
    const sc = STATUS_CONFIG[o.status]||STATUS_CONFIG.received;
    return `<tr>
      <td><span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--gold)">${o.id}</span></td>
      <td style="color:var(--text-primary);font-weight:500">${o.clientName}</td>
      <td>${o.product}</td>
      <td style="font-family:'DM Mono',monospace">${(o.qty||0).toLocaleString("fr-FR")}</td>
      <td style="font-family:'DM Mono',monospace;color:var(--text-primary)">${(o.priceHT||0).toFixed(2)} DT</td>
      <td style="font-size:12px;color:var(--text-muted)">${fmtDate(o.createdAt)}</td>
      <td><span class="badge ${sc.badge}">${sc.label}</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm" onclick="openDetail('${o.id}')">Détails</button>
          ${sc.next ? `<button class="btn btn-primary btn-sm" onclick="advanceStatus('${o.id}','${sc.next}')">${sc.nextLabel}</button>` : ""}
        </div>
      </td>
    </tr>`;
  }).join("") : `<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:32px">Aucune commande trouvée</td></tr>`;
}

function openDetail(id){
  const o = DB.getOrder(id);
  if(!o) return;
  const sc = STATUS_CONFIG[o.status]||{};
  const tl = (o.timeline||[]);
  const fmtDt = iso => new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const steps = ["received","bat","production","done"];

  document.getElementById("detailTitle").textContent = `${o.id} — ${o.clientName}`;
  document.getElementById("detailBody").innerHTML = `
    <!-- Timeline -->
    <div class="order-timeline" style="margin-bottom:20px">
      ${steps.map(s=>{
        const done = tl.some(t=>t.status===s)||o.status===s||steps.indexOf(o.status)>steps.indexOf(s);
        const active = o.status===s;
        const icons = {received:"📥",bat:"🖨",production:"⚙",done:"✅"};
        return `<div class="ot-step ${done?"done":""} ${active?"active":""}">
          <div class="ot-dot">${done?icons[s]||"·":""}</div>
          <div class="ot-label">${STATUS_CONFIG[s]?.label||s}</div>
        </div>`;
      }).join("")}
    </div>
    <!-- Specs -->
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card"><div class="card-body">
        <div class="card-title" style="margin-bottom:12px">Spécifications</div>
        ${[["Produit",o.product],["Format",o.specs?.format||"—"],["Papier",o.specs?.paper||"—"],
           ["Impression",o.specs?.color||"—"],["Finitions",(o.specs?.finitions||[]).join(", ")||"Aucune"],
           ["Quantité",(o.qty||0).toLocaleString("fr-FR")+" ex."]
        ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px">
          <span style="color:var(--text-muted)">${k}</span>
          <span style="color:var(--text-primary);text-align:right;max-width:60%">${v}</span>
        </div>`).join("")}
      </div></div>
      <div class="card"><div class="card-body">
        <div class="card-title" style="margin-bottom:12px">Facturation</div>
        <div style="text-align:center;padding:12px 0">
          <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Total HT</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--gold)">${(o.priceHT||0).toFixed(2)} <span style="font-size:16px">DT</span></div>
          <div style="font-size:12px;color:var(--text-muted)">TVA 19% : ${((o.priceHT||0)*0.19).toFixed(2)} DT</div>
          <div style="font-size:14px;color:var(--text-secondary);margin-top:4px">TTC : <strong>${(o.priceTTC||((o.priceHT||0)*1.19)).toFixed(2)} DT</strong></div>
        </div>
        ${sc.next ? `<button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="advanceStatus('${o.id}','${sc.next}');document.getElementById('detailModal').style.display='none'">${sc.nextLabel}</button>` : ""}
        ${o.status!=="cancelled"&&o.status!=="done" ? `<button class="btn btn-danger" style="width:100%;margin-top:8px" onclick="advanceStatus('${o.id}','cancelled');document.getElementById('detailModal').style.display='none'">Annuler la commande</button>` : ""}
      </div></div>
    </div>
    <!-- Historique -->
    <div class="card"><div class="card-body">
      <div class="card-title" style="margin-bottom:12px">Historique</div>
      ${tl.map(t=>`
        <div style="display:flex;gap:12px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--navy-border)">
          <span class="badge badge-${t.status}" style="flex-shrink:0">${STATUS_CONFIG[t.status]?.label||t.status}</span>
          <div>
            <div style="font-size:12px;color:var(--text-primary)">${t.note||"—"}</div>
            <div style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace">${fmtDt(t.at)}</div>
          </div>
        </div>
      `).join("")}
    </div></div>
  `;
  document.getElementById("detailModal").style.display="flex";
}

function advanceStatus(id, newStatus){
  const notes = { bat:"BAT envoyé au client", production:"BAT validé — lancement production", done:"Livraison effectuée", cancelled:"Commande annulée" };
  const updated = DB.updateOrderStatus(id, newStatus, notes[newStatus]||"");
  if (newStatus === "done" && updated) {
    MSG.autoNotifyDelivery(updated);
    showToast("✅ Livraison confirmée — client notifié automatiquement", "success");
  } else {
    showToast("Commande mise à jour → " + (STATUS_CONFIG[newStatus]?.label||newStatus), "success");
  }
  renderPipeline(); filterOrders();
}

function openNewOrderModal(){
  const sel = document.getElementById("nc-client");
  sel.innerHTML = "";
  DB.getClients().forEach(c => { const o=document.createElement("option"); o.value=c.id; o.textContent=c.name; sel.appendChild(o); });
  document.getElementById("newOrderModal").style.display="flex";
}

function createOrder(){
  const clientId = document.getElementById("nc-client").value;
  const client   = DB.getClient(clientId);
  const priceHT  = parseFloat(document.getElementById("nc-price").value)||0;
  const order = DB.createOrder({
    clientId, clientName: client?.name||"—",
    product:  document.getElementById("nc-product").value,
    qty:      parseInt(document.getElementById("nc-qty").value)||0,
    priceHT,  priceTTC: priceHT*1.19,
    specs: {
      format:   document.getElementById("nc-format").value,
      paper:    document.getElementById("nc-paper").value,
      color:    document.getElementById("nc-color").value,
      finitions: document.getElementById("nc-finitions").value ? [document.getElementById("nc-finitions").value] : [],
    },
    note: document.getElementById("nc-note").value,
  });
  document.getElementById("newOrderModal").style.display="none";
  showToast(`Commande ${order.id} créée !`,"success");
  renderPipeline(); filterOrders();
}

document.addEventListener("DOMContentLoaded", () => {
  const session = SIMPACT_AUTH.requireAuth(["superadmin","team","client"]);
  if(session){ SIMPACT_AUTH.renderUserChip(session); SIMPACT_AUTH.setActiveNav("orders"); }
  renderPipeline(); renderClientFilter(); filterOrders();
});
</script>
</body>
</html>
