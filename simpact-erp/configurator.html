<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMPACT ERP — Configurateur de Prix</title>
  <link rel="stylesheet" href="css/simpact.css">
  <style>
    .config-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
    .option-section { background: var(--navy-mid); border: 1px solid var(--navy-border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
    .option-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500;
      border: 1px solid var(--navy-border); background: var(--navy-dark); color: var(--text-muted);
      transition: var(--transition); display: flex; align-items: center; gap: 6px;
    }
    .chip.active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); }
    .chip:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .chip .chip-badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-family: 'DM Mono', monospace; }
    .chip.active .chip-badge { background: var(--gold); color: var(--navy-dark); }
    .chip:not(.active) .chip-badge { background: var(--navy-border); color: var(--text-muted); }

    .qty-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    .qty-btn {
      padding: 10px 6px; text-align: center; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--navy-border); background: var(--navy-dark); transition: var(--transition);
    }
    .qty-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.1); }
    .qty-btn .qty-num { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text-primary); }
    .qty-btn.active .qty-num { color: var(--gold); }
    .qty-btn .qty-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* Panneau prix */
    .price-panel {
      background: linear-gradient(160deg, var(--navy-mid), var(--navy-dark));
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius-xl);
      overflow: hidden;
      position: sticky; top: 80px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .price-header {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      padding: 16px 20px;
    }
    .price-body { padding: 20px; }
    .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 12px; }
    .price-row .pr-label { color: var(--text-muted); }
    .price-row .pr-val   { color: var(--text-primary); font-family: 'DM Mono', monospace; }
    .price-total {
      text-align: center; padding: 16px 0; margin: 12px 0;
      border-top: 1px solid var(--navy-border); border-bottom: 1px solid var(--navy-border);
    }
    .cost-breakdown { background: var(--navy-dark); border-radius: var(--radius-md); padding: 14px; margin: 12px 0; }
    .cost-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
    .cost-row .ck { color: var(--text-dim); }
    .cost-row .cv { color: var(--text-muted); font-family: 'DM Mono', monospace; }
    .palier-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 8px; }
    .palier-table tr { cursor: pointer; }
    .palier-table tr:hover td { background: var(--navy-hover); }
    .palier-table tr.active-row td { background: rgba(201,168,76,0.08); }
    .palier-table td { padding: 5px 8px; border-radius: 4px; }
    .admin-only { display: none; }
  </style>
</head>

// Bug 1 fix — toggleCostEdit : bascule l'affichage du panneau coûts machine
function toggleCostEdit(){
  const breakdown = document.getElementById("costBreakdown");
  if (!breakdown) return;
  const isVisible = breakdown.style.display !== "none" && breakdown.style.display !== "";
  breakdown.style.display = isVisible ? "none" : "block";
  const btn = document.getElementById("adminBtn");
  if (btn) btn.textContent = isVisible ? "⚙ Voir les coûts machine" : "⚙ Masquer les coûts machine";
}

// COÛTS RÉELS CANON V1000 (depuis vos documents)
// ══════════════════════════════════════════════════════
const MACHINE_COSTS = {
  toner_quadri_A4:  0.0449,  // DT/face A4 couleur (T11 CMYK)
  toner_nb_A4:      0.0099,  // DT/face A4 N&B (T11 Black seulement)
  pieces_A4:        0.0314,  // DT/face A4 (pièces d'usure)
  // Total quadri: 0.0764 DT/A4 face
  // Total N&B:    0.0413 DT/A4 face
};

// Prix papier en DT/kg
const PAPER_PRICE_KG = {
  "115g": 3.6, "135g": 3.6, "170g": 3.6, "200g": 3.6, "250g": 3.6,
  "90g": 3.9,  "300g": 3.9, "350g": 3.9,
  "80g": 3.7,  "100g": 3.7,
};

// Taux de couverture moyen par produit (influence le coût toner)
const COVERAGE_RATES = {
  "cartes-visite": 0.80, "flyers-a5": 0.65, "flyers-a4": 0.60,
  "brochures":     0.55, "affiches":  0.70, "enveloppes": 0.30,
  "papier-entete": 0.25, "depliants": 0.60, "livres-nb":  1.0,
};

// Marges cibles par type de client (%)
const MARGIN_TARGET = { superadmin: 45, team: 45, client: 0 };

// Surface A4 en m²
const A4_M2 = 0.21 * 0.297;

function calcPaperCostPerSheet(grammage, format_m2) {
  const key = grammage+"g";
  const prix_kg = PAPER_PRICE_KG[key] || 3.6;
  const poids_kg = (grammage / 1000) * format_m2;
  return poids_kg * prix_kg;
}

function calcMachineCostPerA4Face(isColor, coverage) {
  const toner = isColor
    ? MACHINE_COSTS.toner_quadri_A4 * (coverage / 1.0)  // ajusté au taux réel
    : MACHINE_COSTS.toner_nb_A4;
  return toner + MACHINE_COSTS.pieces_A4;
}

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let state = {
  productIdx: 0, formatIdx: 0, paperIdx: 0, colorIdx: 0,
  qtyIdx: 2, finitions: [],
};

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderProductChips(){
  document.getElementById("productChips").innerHTML = PRODUCTS.map((p,i)=>`
    <div class="chip ${state.productIdx===i?"active":""}" onclick="selectProduct(${i})">
      ${p.icon} ${p.name}
    </div>
  `).join("");
}

function selectProduct(i){
  state = { productIdx:i, formatIdx:0, paperIdx:0, colorIdx:0, qtyIdx:2, finitions:[] };
  renderProductChips(); renderOptions(); updatePrice();
}

function renderOptions(){
  const p = PRODUCTS[state.productIdx];
  document.getElementById("optionsPanel").innerHTML = `
    <!-- Format -->
    <div class="option-section">
      <div class="option-label">① Format</div>
      <div class="chips">${p.formats.map((f,i)=>`
        <div class="chip ${state.formatIdx===i?"active":""}" onclick="state.formatIdx=${i};renderOptions();updatePrice()">
          ${f}
        </div>`).join("")}
      </div>
    </div>
    <!-- Papier -->
    <div class="option-section">
      <div class="option-label">② Support Papier</div>
      <div class="chips">${p.papers.map((pp,i)=>`
        <div class="chip ${state.paperIdx===i?"active":""}" onclick="state.paperIdx=${i};renderOptions();updatePrice()">
          ${pp.label}
          <span class="chip-badge">${pp.g}g</span>
        </div>`).join("")}
      </div>
    </div>
    <!-- Couleur -->
    <div class="option-section">
      <div class="option-label">③ Mode d'Impression</div>
      <div class="chips">${p.colors.map((c,i)=>`
        <div class="chip ${state.colorIdx===i?"active":""}" onclick="state.colorIdx=${i};renderOptions();updatePrice()">
          ${c.label}
        </div>`).join("")}
      </div>
    </div>
    <!-- Quantité -->
    <div class="option-section">
      <div class="option-label">④ Quantité</div>
      <div class="qty-grid">${p.qtBreaks.map((q,i)=>`
        <div class="qty-btn ${state.qtyIdx===i?"active":""}" onclick="state.qtyIdx=${i};renderOptions();updatePrice()">
          <div class="qty-num">${q>=1000?q/1000+"k":q}</div>
          <div class="qty-sub">ex.</div>
        </div>`).join("")}
      </div>
    </div>
    <!-- Finitions -->
    ${p.finitions.length ? `
    <div class="option-section">
      <div class="option-label">⑤ Finitions <span style="color:var(--text-dim);font-weight:400">(optionnel)</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${p.finitions.map(f=>`
          <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid ${state.finitions.includes(f.id)?"var(--gold)":"var(--navy-border)"};background:${state.finitions.includes(f.id)?"rgba(201,168,76,0.08)":"var(--navy-dark)"};cursor:pointer;transition:all 0.15s">
            <input type="checkbox" ${state.finitions.includes(f.id)?"checked":""} onchange="toggleFinition('${f.id}')" style="accentColor:var(--gold);width:14px;height:14px">
            <div>
              <div style="font-size:12px;color:var(--text-primary)">${f.label}</div>
              <div style="font-size:11px;color:var(--gold)">+${f.price} DT</div>
            </div>
          </label>`).join("")}
      </div>
    </div>` : ""}
  `;
}

function toggleFinition(id){
  if(state.finitions.includes(id)) state.finitions = state.finitions.filter(f=>f!==id);
  else state.finitions.push(id);
  renderOptions(); updatePrice();
}

function updatePrice(){
  const p   = PRODUCTS[state.productIdx];
  const paper = p.papers[state.paperIdx];
  const color = p.colors[state.colorIdx];
  const qty   = p.qtBreaks[state.qtyIdx];
  const sellBase = p.sellPrices[state.qtyIdx];

  // Finitions
  const finTotal = state.finitions.reduce((s,fid)=>{
    const f = p.finitions.find(x=>x.id===fid); return s+(f?f.price:0);
  },0);

  // Prix de vente = prix de base + finitions
  const sellHT  = sellBase + finTotal;
  const sellTTC = sellHT * 1.19;
  const unitPrice = sellHT / qty;

  // Coût de revient (pour admin)
  const coverage  = COVERAGE_RATES[p.id] || 0.60;
  const isColor   = color.color;
  const sides     = color.sides;
  const machinePerA4 = calcMachineCostPerA4Face(isColor, coverage);

  // Nombre de feuilles SRA3 nécessaires
  const sheetsNeeded = Math.ceil(qty / p.pieces_per_A3);
  const paperCostPerSheet = calcPaperCostPerSheet(paper.g, p.format_m2);

  // Surface imprimée en équivalent A4
  const a4EquivPerSheet = p.format_m2 / A4_M2;
  const machineTotal = sheetsNeeded * a4EquivPerSheet * sides * machinePerA4;
  const paperTotal   = sheetsNeeded * paperCostPerSheet;
  const costTotal    = machineTotal + paperTotal;
  const margin       = sellHT > 0 ? ((sellHT - costTotal) / sellHT * 100) : 0;

  // Mise à jour UI
  document.getElementById("ph-product").textContent = p.name;
  document.getElementById("ph-specs").textContent = `${p.formats[state.formatIdx]} · ${paper.label} · ${color.label}`;

  document.getElementById("priceHT").textContent  = sellHT.toFixed(2) + " DT";
  document.getElementById("priceUnit").textContent = `soit ${unitPrice.toFixed(3)} DT / exemplaire`;
  document.getElementById("priceTTC").textContent  = `TTC (TVA 19%) : ${sellTTC.toFixed(2)} DT`;

  // Résumé config
  document.getElementById("configSummary").innerHTML = [
    ["Papier", paper.label], ["Impression", color.label],
    ["Quantité", qty.toLocaleString("fr-FR")+" exemplaires"],
    ...state.finitions.map(fid => { const f=p.finitions.find(x=>x.id===fid); return f?[f.label,`+${f.price} DT`]:null; }).filter(Boolean)
  ].map(([k,v])=>`<div class="price-row"><span class="pr-label">${k}</span><span class="pr-val">${v}</span></div>`).join("");

  // Breakdown coût (admin)
  if(isAdmin){
    const marginColor = margin>40?"var(--success)":margin>25?"var(--warning)":"var(--danger)";
    document.getElementById("costBreakdown").innerHTML = `
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;font-family:'DM Mono',monospace">⚙ Coût de revient (admin)</div>
      ${[
        ["Papier ("+sheetsNeeded+" feuilles)", paperTotal.toFixed(2)+" DT"],
        ["Machine Canon V1000", machineTotal.toFixed(2)+" DT"],
        ["Finitions", finTotal.toFixed(2)+" DT"],
        ["Coût total", costTotal.toFixed(2)+" DT"],
        ["Prix vente", sellHT.toFixed(2)+" DT"],
      ].map(([k,v])=>`<div class="cost-row"><span class="ck">${k}</span><span class="cv">${v}</span></div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding-top:8px;margin-top:4px;border-top:1px solid var(--navy-border);font-weight:700;font-size:12px">
        <span style="color:var(--text-secondary)">Marge brute</span>
        <span style="color:${marginColor}">${margin.toFixed(1)}%</span>
      </div>
    `;
  }

  // Table paliers
  document.getElementById("palierTable").innerHTML = p.qtBreaks.map((q,i)=>{
    const sp = p.sellPrices[i] + finTotal;
    const u  = (sp/q).toFixed(3);
    return `<tr class="${state.qtyIdx===i?"active-row":""}" onclick="state.qtyIdx=${i};renderOptions();updatePrice()">
      <td style="color:${state.qtyIdx===i?"var(--gold)":"var(--text-muted)"}; font-family:'DM Mono',monospace">${q.toLocaleString("fr-FR")} ex.</td>
      <td style="text-align:right;color:${state.qtyIdx===i?"var(--text-primary)":"var(--text-dim)"};font-family:'DM Mono',monospace">${sp.toFixed(2)} DT</td>
      <td style="text-align:right;color:var(--text-dim);font-size:10px">${u} DT/u</td>
    </tr>`;
  }).join("");
}

// ─── CRÉER COMMANDE PRÉ-REMPLIE ─────────────────────────
function addToOrder() {
  // Récupérer la config actuelle
  const p        = PRODUCTS[state.productIdx];
  const paper    = p.papers[state.paperIdx];
  const color    = p.colors[state.colorIdx];
  const qty      = p.qtBreaks[state.qtyIdx];
  const priceHT  = p.sellPrices[state.qtyIdx] + state.finitions.reduce((s,fid)=>{
    const f=p.finitions.find(x=>x.id===fid); return s+(f?f.price:0);
  }, 0);
  const finLabels= state.finitions.map(fid => p.finitions.find(x=>x.id===fid)?.label).filter(Boolean);

  // Stocker la config en session pour pré-remplissage
  sessionStorage.setItem("simpact_prefill", JSON.stringify({
    product:  p.name,
    format:   p.formats[state.formatIdx],
    paper:    paper.label,
    color:    color.label,
    qty,
    priceHT: priceHT.toFixed(2),
    finitions: finLabels,
  }));

  // Afficher modal choix client
  const clients = DB.getClients();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(4,9,15,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)";
  overlay.innerHTML = `
    <div class="modal" style="max-width:480px;width:95%">
      <div class="modal-header">
        <div class="modal-title">Créer la commande</div>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer">×</button>
      </div>
      <div class="modal-body">
        <!-- Récap config -->
        <div style="background:var(--navy-dark);border:1px solid var(--navy-border);border-radius:var(--radius-md);padding:14px;margin-bottom:16px">
          <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:'DM Mono',monospace">Configuration sélectionnée</div>
          ${[
            ["Produit", p.name],
            ["Format",  p.formats[state.formatIdx]],
            ["Papier",  paper.label],
            ["Impression", color.label],
            ["Quantité", qty.toLocaleString("fr-FR")+" ex."],
            ...(finLabels.length ? [["Finitions", finLabels.join(", ")]] : []),
          ].map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
              <span style="color:var(--text-muted)">${k}</span>
              <span style="color:var(--text-primary);text-align:right;max-width:55%">${v}</span>
            </div>`).join("")}
          <div style="border-top:1px solid var(--navy-border);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700">
            <span style="color:var(--text-secondary)">Total HT</span>
            <span style="color:var(--gold);font-family:'DM Mono',monospace">${priceHT.toFixed(2)} DT</span>
          </div>
        </div>
        <!-- Choix client -->
        <div class="form-group">
          <label class="form-label">Attribuer à un client</label>
          <select class="form-control" id="modal-client-sel">
            ${clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Note interne (optionnel)</label>
          <textarea class="form-control" id="modal-note" rows="2" placeholder="Instructions particulières…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Annuler</button>
        <button class="btn btn-primary" onclick="confirmCreateOrder(${priceHT.toFixed(2)},${qty},'${p.name}','${p.formats[state.formatIdx]}','${paper.label}','${color.label}',${JSON.stringify(finLabels)})">
          ✓ Créer la commande
        </button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });
}

function confirmCreateOrder(priceHT, qty, product, format, paper, color, finitions) {
  const clientId = document.getElementById("modal-client-sel").value;
  const note     = document.getElementById("modal-note").value.trim();
  const client   = DB.getClient(clientId);

  const order = DB.createOrder({
    clientId, clientName: client?.name || "—",
    product, qty, priceHT: parseFloat(priceHT), priceTTC: priceHT*1.19,
    specs: { format, paper, color, finitions },
    note,
  });

  document.querySelector(".modal-overlay")?.remove();
  showToast(`✓ Commande ${order.id} créée pour ${client?.name}`, "success");

  // Redirect vers orders avec la nouvelle commande visible
  setTimeout(() => window.location.href = "orders.html", 1000);
}

// Init
renderProductChips(); renderOptions(); updatePrice();
</script>
</body>
</html>
